# dbt_project.yml
name: 'gss_analytics'
version: '1.0.0'
config-version: 2

profile: 'gss_analytics'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

models:
  gss_analytics:
    staging:
      +materialized: view
      +schema: staging
    marts:
      core:
        +materialized: table
        +schema: analytics
      metrics:
        +materialized: table
        +schema: analytics
